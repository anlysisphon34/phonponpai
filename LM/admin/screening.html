<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คัดกรองสุขภาพ</title>
<link rel="stylesheet" href="admin.css">
<script src="sidebar.js"></script>
<style>
.topbar-btns{display:flex;gap:10px}
.btn-outline{padding:10px 20px;border-radius:100px;border:2px solid var(--border);background:transparent;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--stone);cursor:pointer;font-weight:600}
.btn-primary{padding:10px 24px;border-radius:100px;border:none;background:var(--terra);color:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(200,107,58,.3)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}

/* Card */
.card{background:var(--warm-white);border-radius:18px;padding:24px;box-shadow:0 2px 8px rgba(42,31,26,.06)}
.card-title{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* Field */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--stone);margin-bottom:6px;letter-spacing:.03em}
.field label .req{color:var(--terra)}
.field input,.field select{
  width:100%;padding:11px 14px;border-radius:12px;
  border:2px solid var(--border);background:var(--cream);
  font-family:'Sarabun',sans-serif;font-size:14px;color:var(--bark);outline:none;
  transition:border-color .15s,background .15s;
}
.field input:focus,.field select:focus{border-color:var(--terra);background:var(--warm-white)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* BMI display */
.bmi-result{
  padding:12px 16px;border-radius:12px;
  display:flex;align-items:center;justify-content:space-between;
  margin-top:-8px;margin-bottom:16px;
}
.bmi-val{font-size:24px;font-weight:800}
.bmi-cat{font-size:12px;font-weight:600;padding:4px 10px;border-radius:100px}

/* BP row */
.bp-wrap{display:flex;align-items:center;gap:8px}
.bp-sep{font-size:20px;color:var(--mist);font-weight:300}

/* Checkbox grid */
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-item-sm{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;border-radius:10px;border:2px solid var(--border);background:var(--cream);transition:all .15s}
.check-item-sm:has(input:checked){border-color:var(--terra);background:var(--terra-light)}
.check-item-sm input{display:none}
.check-item-sm span{font-size:13px;color:var(--bark)}

/* Risk preview */
.risk-preview{
  background:var(--warm-white);border-radius:18px;padding:24px;
  box-shadow:0 2px 8px rgba(42,31,26,.06);margin-top:20px;
}
.risk-preview-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mist);margin-bottom:16px}
.risk-result-card{
  border-radius:14px;padding:20px;display:flex;align-items:center;gap:16px;
  border:2px solid;transition:all .3s;
}
.risk-result-icon{font-size:36px}
.risk-result-name{font-size:20px;font-weight:800}
.risk-result-desc{font-size:13px;margin-top:4px;opacity:.8}
.risk-criteria{margin-top:16px;display:flex;flex-direction:column;gap:6px}
.crit-item{display:flex;align-items:center;gap:8px;font-size:13px}
.crit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* Participant search */
.search-banner{background:var(--warm-white);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:12px}
.search-banner-input{flex:1;padding:10px 16px;border-radius:12px;border:2px solid var(--border);background:var(--cream);font-family:'Sarabun',sans-serif;font-size:14px;outline:none}
.search-banner-input:focus{border-color:var(--terra)}
.search-results{position:absolute;top:100%;left:0;right:0;background:var(--warm-white);border:2px solid var(--border);border-radius:14px;box-shadow:0 8px 24px rgba(42,31,26,.12);z-index:50;margin-top:4px;overflow:hidden;max-height:240px;overflow-y:auto}
.search-result-item{padding:12px 16px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--cream)}
.search-result-name{font-size:14px;font-weight:600;color:var(--bark)}
.search-result-meta{font-size:12px;color:var(--stone);margin-top:1px}
.search-wrap-rel{position:relative;flex:1}
.selected-chip{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--forest-light);border:2px solid var(--forest);border-radius:12px;font-size:13px;font-weight:600;color:var(--forest)}
.selected-clear{background:none;border:none;font-size:18px;cursor:pointer;color:var(--stone);padding:0;line-height:1}
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div><h1>คัดกรองสุขภาพ</h1><p id="topbarSub">เลือกผู้เข้าร่วมก่อนบันทึก</p></div>
      <div class="topbar-btns">
        <button class="btn-outline" onclick="window.print()">🖨 พิมพ์ผล</button>
        <button class="btn-primary" id="saveBtn" onclick="saveScreening()">💾 บันทึก</button>
      </div>
    </div>

    <!-- Participant search bar -->
    <div class="search-banner">
      <span style="font-size:13px;font-weight:700;color:var(--stone);white-space:nowrap">ผู้รับการคัดกรอง:</span>
      <div id="searchArea" style="flex:1;position:relative">
        <input class="search-banner-input" id="ptSearch" type="text" placeholder="ค้นหาชื่อ หรือ เบอร์โทร..." oninput="searchParticipant()">
        <div class="search-results" id="searchResults" style="display:none"></div>
      </div>
      <div id="selectedChip" style="display:none">
        <div class="selected-chip">
          <span id="selectedName">—</span>
          <button class="selected-clear" onclick="clearSelected()">✕</button>
        </div>
      </div>
    </div>

    <div class="body">
      <div class="form-grid">
        <!-- Left column -->
        <div>
          <div class="card" style="margin-bottom:20px">
            <div class="card-title">ค่าร่างกาย</div>
            <div class="field-row">
              <div class="field"><label>น้ำหนัก <span class="req">*</span></label>
                <input type="number" id="weight" placeholder="กก." step=".1" oninput="calcBMI()"></div>
              <div class="field"><label>ส่วนสูง <span class="req">*</span></label>
                <input type="number" id="height" placeholder="ซม." step=".1" oninput="calcBMI()"></div>
            </div>
            <div class="bmi-result" id="bmiResult" style="display:none">
              <div><div style="font-size:12px;color:var(--stone);margin-bottom:2px">ค่า BMI</div>
                <div class="bmi-val" id="bmiVal"></div></div>
              <span class="bmi-cat" id="bmiCat"></span>
            </div>
            <div class="field"><label>รอบเอว</label>
              <input type="number" id="waist" placeholder="ซม." oninput="calcRisk()"></div>
            <div class="field"><label>ความดันโลหิต <span class="req">*</span></label>
              <div class="bp-wrap">
                <input type="number" id="bpSys" placeholder="Systolic" oninput="calcRisk()" style="flex:1">
                <span class="bp-sep">/</span>
                <input type="number" id="bpDia" placeholder="Diastolic" oninput="calcRisk()" style="flex:1">
              </div></div>
            <div class="field"><label>น้ำตาลปลายนิ้ว (ถ้ามี)</label>
              <input type="number" id="glucose" placeholder="mg/dL" oninput="calcRisk()"></div>
          </div>

          <div class="card">
            <div class="card-title">พฤติกรรมสุขภาพ</div>
            <div class="field"><label>ออกกำลังกายต่อสัปดาห์</label>
              <select id="exercise" onchange="calcRisk()">
                <option value="">เลือก</option>
                <option value="0">ไม่ออกเลย</option>
                <option value="low">น้อยกว่า 60 นาที</option>
                <option value="mid">60–150 นาที</option>
                <option value="good">มากกว่า 150 นาที</option>
              </select></div>
            <div class="field-row">
              <div class="field"><label>ชั่วโมงนอนเฉลี่ย</label>
                <input type="number" id="sleep" placeholder="ชม./คืน" min="3" max="12" oninput="calcRisk()"></div>
              <div class="field"><label>ความเครียด (1–5)</label>
                <input type="number" id="stress" placeholder="1=น้อย 5=มาก" min="1" max="5" oninput="calcRisk()"></div>
            </div>
            <div class="field"><label>พฤติกรรมเสี่ยง</label>
              <div class="check-grid">
                <label class="check-item-sm"><input type="checkbox" value="sugar" onchange="calcRisk()"><span>ดื่มน้ำหวานบ่อย</span></label>
                <label class="check-item-sm"><input type="checkbox" value="salty" onchange="calcRisk()"><span>กินอาหารเค็ม</span></label>
                <label class="check-item-sm"><input type="checkbox" value="smoke" onchange="calcRisk()"><span>สูบบุหรี่</span></label>
                <label class="check-item-sm"><input type="checkbox" value="alcohol" onchange="calcRisk()"><span>ดื่มแอลกอฮอล์</span></label>
              </div>
            </div>
          </div>
        </div>

        <!-- Right column -->
        <div>
          <div class="card" style="margin-bottom:20px">
            <div class="card-title">ประวัติทางการแพทย์</div>
            <div class="field"><label>โรคประจำตัว</label>
              <div class="check-grid">
                <label class="check-item-sm"><input type="checkbox"><span>เบาหวาน</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>ความดันสูง</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>โรคหัวใจ</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>โรคไต</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>ไทรอยด์</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>อื่น ๆ</span></label>
              </div></div>
            <div class="field" style="margin-top:4px"><label>ยาที่ใช้ประจำ</label>
              <input type="text" placeholder="เช่น Metformin, Amlodipine..."></div>
            <div class="field"><label>ประวัติครอบครัว</label>
              <div class="check-grid">
                <label class="check-item-sm"><input type="checkbox"><span>เบาหวาน</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>ความดัน</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>โรคหัวใจ</span></label>
                <label class="check-item-sm"><input type="checkbox"><span>มะเร็ง</span></label>
              </div></div>
          </div>

          <!-- Risk Preview -->
          <div class="risk-preview">
            <div class="risk-preview-title">ผลการประเมินความเสี่ยง (อัตโนมัติ)</div>
            <div class="risk-result-card" id="riskCard"
              style="background:var(--border);border-color:var(--border);color:var(--stone)">
              <div class="risk-result-icon">⏳</div>
              <div>
                <div class="risk-result-name">กรอกข้อมูลเพื่อประเมิน</div>
                <div class="risk-result-desc">ป้อนค่าทางด้านซ้ายเพื่อดูผล</div>
              </div>
            </div>
            <div class="risk-criteria" id="riskCriteria"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz7zegkAeUyTwu7AYvvMflFjWLVpF8mAmsvomyCfSnPFaFyFUEh-PbWjf7GPmzEGie/exec';
let selectedParticipant = null;
let searchTimer = null;

window.addEventListener('DOMContentLoaded', () => {
  document.addEventListener('click', e => {
    if (!e.target.closest('#searchArea')) {
      document.getElementById('searchResults').style.display = 'none';
    }
  });
});

// ── Participant search ────────────────────────────────────────────────────────
function searchParticipant() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('ptSearch').value.trim();
    if (q.length < 2) { document.getElementById('searchResults').style.display = 'none'; return; }
    const res  = await fetch(`${SCRIPT_URL}?action=searchParticipant&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    const box  = document.getElementById('searchResults');
    if (!data.ok || !data.results.length) {
      box.innerHTML = '<div class="search-result-item" style="color:var(--stone)">ไม่พบรายชื่อ</div>';
    } else {
      box.innerHTML = data.results.map(r => `
        <div class="search-result-item" onclick="selectParticipant(${JSON.stringify(r).replace(/"/g,'&quot;')})">
          <div class="search-result-name">${r.name}</div>
          <div class="search-result-meta">${r.community} · ${r.participantId}</div>
        </div>`).join('');
    }
    box.style.display = 'block';
  }, 400);
}

function selectParticipant(p) {
  selectedParticipant = p;
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('ptSearch').style.display     = 'none';
  document.getElementById('selectedChip').style.display = 'block';
  document.getElementById('selectedName').textContent   = `${p.name} · ${p.participantId}`;
  document.getElementById('topbarSub').textContent      = `${p.name} · ${p.participantId}`;
}

function clearSelected() {
  selectedParticipant = null;
  document.getElementById('ptSearch').value    = '';
  document.getElementById('ptSearch').style.display     = 'block';
  document.getElementById('selectedChip').style.display = 'none';
  document.getElementById('topbarSub').textContent      = 'เลือกผู้เข้าร่วมก่อนบันทึก';
}

// ── BMI & Risk ────────────────────────────────────────────────────────────────
function calcBMI() {
  const w = parseFloat(document.getElementById('weight').value);
  const h = parseFloat(document.getElementById('height').value) / 100;
  if (!w || !h) { document.getElementById('bmiResult').style.display='none'; return; }
  const bmi = (w/(h*h)).toFixed(1);
  const cats = [[18.5,'น้ำหนักน้อย','#1A7FBD','#E8F4FD'],[23,'ปกติ','#2D8A55','#EBF6EE'],[25,'น้ำหนักเกิน','#C89B20','#FEF6DC'],[30,'อ้วน','#C86B3A','#FEF0E4'],[999,'อ้วนมาก','#B03030','#FDEAEA']];
  const [,label,color,bg] = cats.find(([t]) => bmi < t) || cats[cats.length-1];
  const res = document.getElementById('bmiResult');
  res.style.display='flex'; res.style.background=bg;
  document.getElementById('bmiVal').textContent = bmi;
  document.getElementById('bmiVal').style.color = color;
  const cat = document.getElementById('bmiCat');
  cat.textContent = label; cat.style.background = bg; cat.style.color = color; cat.style.border = '1px solid '+color;
  calcRisk();
}

function calcRisk() {
  const w    = parseFloat(document.getElementById('weight').value) || 0;
  const h    = parseFloat(document.getElementById('height').value) || 0;
  const waist= parseFloat(document.getElementById('waist').value)  || 0;
  const sys  = parseFloat(document.getElementById('bpSys').value)  || 0;
  const dia  = parseFloat(document.getElementById('bpDia').value)  || 0;
  const gluc = parseFloat(document.getElementById('glucose').value)|| 0;
  const bmi  = h ? w / ((h/100)**2) : 0;
  const risks = [];
  if (sys >= 160 || dia >= 100) risks.push({c:'red',   t:`ความดันสูงมาก (${sys}/${dia}) ต้องส่งต่อ`});
  else if (sys >= 140 || dia >= 90) risks.push({c:'orange', t:`ความดันสูง (${sys}/${dia})`});
  if (gluc >= 200) risks.push({c:'red',   t:`น้ำตาลสูงมาก (${gluc} mg/dL) ต้องส่งต่อ`});
  else if (gluc >= 100) risks.push({c:'orange', t:`น้ำตาลเกินเกณฑ์ (${gluc} mg/dL)`});
  if (bmi >= 30) risks.push({c:'orange', t:`BMI สูง (${bmi.toFixed(1)})`});
  else if (bmi >= 23) risks.push({c:'yellow', t:`BMI เกินเกณฑ์ (${bmi.toFixed(1)})`});
  if (waist >= 90) risks.push({c:'orange', t:`รอบเอวเกิน (${waist} ซม.)`});
  const level = risks.some(r=>r.c==='red') ? 'red' : risks.some(r=>r.c==='orange') ? 'orange' : risks.some(r=>r.c==='yellow') ? 'yellow' : (risks.length===0 && bmi) ? 'green' : '';
  const riskDefs = {
    red:   ['#B03030','#FDEAEA','กลุ่มแดง — ต้องส่งต่อ','ค่าผิดปกติชัดเจน ต้องพบบุคลากรสุขภาพทันที'],
    orange:['#C86B3A','#FEF0E4','กลุ่มส้ม — เสี่ยงสูง','ติดตามทุก 2 สัปดาห์ + แผนเฉพาะบุคคล'],
    yellow:['#C89B20','#FEF6DC','กลุ่มเหลือง — เสี่ยงปานกลาง','โปรแกรมปรับพฤติกรรม 12 สัปดาห์'],
    green: ['#2D8A55','#EBF6EE','กลุ่มเขียว — สุขภาพดี','รักษาพฤติกรรมดีไว้ เข้าร่วมกิจกรรมทั่วไป'],
  };
  if (level && riskDefs[level]) {
    const [c, bg, name, desc] = riskDefs[level];
    const card = document.getElementById('riskCard');
    card.style.background = bg; card.style.borderColor = c+'66'; card.style.color = c;
    card.innerHTML = `<div class="risk-result-icon">${level==='red'?'🔴':level==='orange'?'🟠':level==='yellow'?'🟡':'🟢'}</div><div><div class="risk-result-name" style="color:${c}">${name}</div><div class="risk-result-desc" style="color:${c}">${desc}</div></div>`;
    const crit = document.getElementById('riskCriteria');
    const dotColors = {red:'#B03030',orange:'#C86B3A',yellow:'#C89B20'};
    crit.innerHTML = risks.map(r => `<div class="crit-item"><div class="crit-dot" style="background:${dotColors[r.c]||'#ccc'}"></div><span style="color:var(--stone)">${r.t}</span></div>`).join('');
  }
}

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveScreening() {
  if (!selectedParticipant) {
    alert('กรุณาเลือกผู้เข้าร่วมก่อนบันทึก');
    return;
  }
  const weight = document.getElementById('weight').value;
  const height = document.getElementById('height').value;
  const bpSys  = document.getElementById('bpSys').value;
  const bpDia  = document.getElementById('bpDia').value;
  if (!weight || !height || !bpSys || !bpDia) {
    alert('กรุณากรอกน้ำหนัก ส่วนสูง และความดันโลหิต');
    return;
  }
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'กำลังบันทึก...'; btn.disabled = true;
  const params = new URLSearchParams({
    action     : 'saveScreening',
    lineUserId : selectedParticipant.lineUserId,
    weight, height,
    waist      : document.getElementById('waist').value   || 0,
    bpSys, bpDia,
    bloodSugar : document.getElementById('glucose').value || '',
    screenedBy : 'เจ้าหน้าที่ (desktop)',
  });
  try {
    const res  = await fetch(`${SCRIPT_URL}?${params}`);
    const data = await res.json();
    if (data.ok) {
      btn.textContent  = '✓ บันทึกแล้ว';
      btn.style.background = 'var(--forest)';
      document.getElementById('topbarSub').textContent = `${selectedParticipant.name} · บันทึกแล้ว · กลุ่ม${data.riskGroup}`;
    } else {
      alert('บันทึกไม่สำเร็จ: ' + (data.error || 'unknown'));
      btn.textContent = '💾 บันทึก'; btn.disabled = false;
    }
  } catch (e) {
    alert('ไม่สามารถเชื่อมต่อได้');
    btn.textContent = '💾 บันทึก'; btn.disabled = false;
  }
}
</script>
</body>
</html>
