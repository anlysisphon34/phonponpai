<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>เช็กอินสำเร็จ</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sarabun',sans-serif;overflow:hidden}
.app{
  max-width:430px;margin:0 auto;height:100dvh;
  background:linear-gradient(170deg,#1A3826 0%,#2D5A3D 50%,#3A6B4A 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px calc(env(safe-area-inset-bottom,0px) + 40px);
  text-align:center;position:relative;overflow:hidden;
}

/* Background circles */
.bg-circle{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.04);
  animation:pulse 4s ease-in-out infinite;
}
.bc1{width:300px;height:300px;top:-80px;right:-80px}
.bc2{width:200px;height:200px;bottom:-60px;left:-60px;animation-delay:1s}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}

/* Check animation */
.check-wrap{
  width:120px;height:120px;margin:0 auto 28px;
  background:rgba(255,255,255,.1);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.check-wrap::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:3px solid rgba(255,255,255,.2);
  animation:spin 8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.check-icon{
  width:64px;height:64px;background:white;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.2);
}
.check-icon svg{width:32px;height:32px}

/* Station tag */
.station-tag{
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:100px;padding:8px 20px;
  font-size:13px;color:rgba(255,255,255,.8);font-weight:600;
  letter-spacing:.05em;margin-bottom:20px;
  animation:fadeUp .5s .3s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* Main text */
.main-title{
  font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;
  animation:fadeUp .5s .4s both;
}
.main-sub{
  font-size:15px;color:rgba(255,255,255,.6);margin-bottom:36px;line-height:1.5;
  animation:fadeUp .5s .5s both;
}

/* Points earned */
.points-card{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  border-radius:24px;padding:24px;width:100%;margin-bottom:28px;
  animation:fadeUp .5s .6s both;
}
.points-earned{
  font-size:56px;font-weight:800;color:#E8A830;line-height:1;
  margin-bottom:4px;
}
.points-earned-label{font-size:14px;color:rgba(255,255,255,.6);margin-bottom:20px}
.points-divider{height:1px;background:rgba(255,255,255,.1);margin:0 0 16px}
.points-total-row{display:flex;align-items:center;justify-content:space-between}
.points-total-label{font-size:13px;color:rgba(255,255,255,.5)}
.points-total-val{font-size:20px;font-weight:700;color:#fff}

/* Time */
.time-row{
  font-size:13px;color:rgba(255,255,255,.4);margin-bottom:36px;
  animation:fadeUp .5s .7s both;
}

/* Button */
.btn-back{
  width:100%;padding:16px;border-radius:100px;border:none;cursor:pointer;
  background:rgba(255,255,255,.15);color:#fff;
  font-family:'Sarabun',sans-serif;font-size:17px;font-weight:700;
  transition:background .2s;animation:fadeUp .5s .8s both;
  -webkit-tap-highlight-color:transparent;
}
.btn-back:active{background:rgba(255,255,255,.25)}
</style>
</head>
<body>
<div class="app">
  <div class="bg-circle bc1"></div>
  <div class="bg-circle bc2"></div>

  <div class="check-wrap">
    <div class="check-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#2D5A3D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
  </div>

  <div class="station-tag" id="stationTag">📍 สถานีที่ 3 — ลดเค็ม</div>

  <div class="main-title">เช็กอินสำเร็จ!</div>
  <div class="main-sub">คุณได้รับความรู้เรื่องการลดโซเดียม<br>และบันทึกลงแผนสุขภาพแล้ว</div>

  <div class="points-card">
    <div class="points-earned" id="pointsEarned">+5</div>
    <div class="points-earned-label">คะแนนที่ได้รับ</div>
    <div class="points-divider"></div>
    <div class="points-total-row">
      <span class="points-total-label">คะแนนสะสมทั้งหมด</span>
      <span class="points-total-val" id="totalPoints">317 คะแนน</span>
    </div>
  </div>

  <div class="time-row" id="timeRow"></div>

  <button class="btn-back" onclick="window.close()">กลับหน้าหลัก</button>
</div>

<script>
/*######################### Editable Start #########################*/
const LIFF_ID    = '2006915175-42T9BO4a';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz7zegkAeUyTwu7AYvvMflFjWLVpF8mAmsvomyCfSnPFaFyFUEh-PbWjf7GPmzEGie/exec';
/*#########################  Editable End  #########################*/

const stationNames = {
  '1':'สถานีที่ 1 — รู้ค่าร่างกาย',
  '2':'สถานีที่ 2 — ลดหวาน',
  '3':'สถานีที่ 3 — ลดเค็ม',
  '4':'สถานีที่ 4 — เดินครบ 150 นาที',
  '5':'สถานีที่ 5 — นอนดี ลดเครียด',
  '6':'สถานีที่ 6 — แผนสุขภาพส่วนตัว',
};

// ── URL params (ฝัง QR Code ก่อนพิมพ์) ─────────────────────────────────────
const _qp          = new URLSearchParams(location.search);
const stationId    = _qp.get('station') || '1';
const stationName  = stationNames[stationId] || 'สถานีกิจกรรม';
const pts          = parseInt(_qp.get('pts') || '5');

document.getElementById('stationTag').textContent = '📍 ' + stationName;
document.getElementById('pointsEarned').textContent = '+' + pts;

const now = new Date();
const t   = now.toLocaleTimeString('th-TH', {hour:'2-digit', minute:'2-digit'});
const d   = now.toLocaleDateString('th-TH', {day:'numeric', month:'long', year:'numeric'});
document.getElementById('timeRow').textContent = d + ' เวลา ' + t + ' น.';

// ── LIFF + record check-in ──────────────────────────────────────────────────
liff.init({ liffId: LIFF_ID })
  .then(() => {
    if (!liff.isLoggedIn()) { liff.login(); return; }
    return liff.getProfile();
  })
  .then(async profile => {
    if (!profile) return;
    const lineUserId = profile.userId;

    const params = new URLSearchParams({
      action     : 'checkin',
      lineUserId,
      stationId,
      stationName,
      pts,
    }).toString();

    try {
      const res    = await fetch(`${SCRIPT_URL}?${params}`);
      const result = await res.json();
      if (result.ok) {
        document.getElementById('totalPoints').textContent = result.totalPoints + ' คะแนน';
      } else if (result.error === 'already_checkin') {
        document.getElementById('stationTag').textContent = '⚠️ เช็คอินไปแล้ววันนี้';
        document.getElementById('pointsEarned').textContent = '+0';
      }
    } catch (err) {
      console.error('checkin error:', err);
    }
  })
  .catch(() => {
    // dev mode — แสดงผลตามปกติ ไม่บันทึก
    document.getElementById('totalPoints').textContent = '— คะแนน';
  });
</script>
</body>
</html>
