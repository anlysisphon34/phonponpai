<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ผลสุขภาพของฉัน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --terra:#C86B3A;--terra-light:#F2DDD0;
  --forest:#2D5A3D;--forest-light:#EAF3EE;
  --amber:#E8A830;--amber-light:#FEF3D5;
  --cream:#F9F5EE;--warm-white:#FFFDF9;
  --bark:#2A1F1A;--stone:#6B5347;--mist:#C8B9B0;
  /* Risk */
  --rg:#2D8A55;--rg-bg:#EBF6EE;
  --ry:#C89B20;--ry-bg:#FEF6DC;
  --ro:#C86B3A;--ro-bg:#FEF0E4;
  --rr:#B03030;--rr-bg:#FDEAEA;
}
html,body{height:100%;background:var(--cream);font-family:'Sarabun',sans-serif;color:var(--bark)}
.app{max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden}
.content{padding-bottom:40px}

/* Hero */
.hero{
  background:linear-gradient(160deg, #2D5A3D 0%, #1A3826 100%);
  padding:calc(env(safe-area-inset-top,0px) + 20px) 24px 36px;
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;right:-30px;top:-30px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.hero-name{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px;letter-spacing:.05em}
.hero-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:20px;line-height:1.2}

/* Risk badge large */
.risk-badge{
  display:inline-flex;align-items:center;gap:10px;
  padding:12px 20px;border-radius:16px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  margin-bottom:24px;
}
.risk-dot{width:12px;height:12px;border-radius:50%}
.risk-badge-text{font-size:16px;font-weight:700;color:#fff}
.risk-badge-sub{font-size:12px;color:rgba(255,255,255,.6)}

/* Score ring */
.score-wrap{display:flex;align-items:center;gap:20px}
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-num{font-size:20px;font-weight:800;color:#fff;line-height:1}
.ring-lbl{font-size:9px;color:rgba(255,255,255,.6);letter-spacing:.05em}
.score-info p{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:4px}
.score-info strong{font-size:28px;font-weight:800;color:#fff}
.score-info span{font-size:13px;color:rgba(255,255,255,.5)}

/* Streak */
.streak-wrap{
  background:rgba(255,255,255,.08);border-radius:14px;
  padding:14px 16px;margin-top:20px;
}
.streak-label{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:10px;font-weight:600;letter-spacing:.05em}
.streak-dots{display:flex;gap:6px;flex-wrap:wrap}
.dot{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
}
.dot.done{background:var(--amber);color:#fff}
.dot.current{background:rgba(255,255,255,.3);color:#fff;border:2px solid rgba(255,255,255,.5)}
.dot.pending{background:rgba(255,255,255,.08);color:rgba(255,255,255,.3)}

/* Scroll content */
.pad{padding:20px}

/* Section title */
.sect-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mist);margin:4px 0 12px}

/* Before/After card */
.ba-card{
  background:var(--warm-white);border-radius:20px;
  padding:20px;margin-bottom:16px;
  box-shadow:0 2px 8px rgba(42,31,26,.06);
}
.ba-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid #F0EBE3;
}
.ba-row:last-child{border-bottom:none;padding-bottom:0}
.ba-row:first-child{padding-top:0}
.ba-name{font-size:14px;color:var(--stone)}
.ba-vals{display:flex;align-items:center;gap:10px}
.ba-before{font-size:14px;color:var(--mist);text-decoration:line-through}
.ba-arrow{font-size:12px;color:var(--mist)}
.ba-after{font-size:16px;font-weight:700}
.ba-after.good{color:var(--forest)}
.ba-after.warn{color:var(--terra)}
.ba-delta{
  font-size:11px;font-weight:600;padding:3px 8px;border-radius:100px;
}
.ba-delta.pos{background:var(--forest-light);color:var(--forest)}
.ba-delta.neg{background:var(--rr-bg);color:var(--rr)}

/* Behavior card */
.beh-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.beh-item{
  background:var(--warm-white);border-radius:16px;padding:16px;
  box-shadow:0 2px 8px rgba(42,31,26,.06);
}
.beh-icon{font-size:24px;margin-bottom:8px}
.beh-label{font-size:12px;color:var(--stone);margin-bottom:4px}
.beh-val{font-size:20px;font-weight:700;color:var(--bark)}
.beh-unit{font-size:12px;color:var(--mist)}
.beh-bar{height:4px;background:var(--border);border-radius:4px;margin-top:10px;overflow:hidden}
.beh-fill{height:100%;border-radius:4px;background:var(--terra)}

/* Message card */
.msg-card{
  background:linear-gradient(135deg,var(--amber-light),#FEF9EC);
  border-radius:20px;padding:20px;margin-bottom:24px;
  border:1px solid rgba(232,168,48,.2);
}
.msg-card p{font-size:15px;color:var(--bark);line-height:1.6}
.msg-card strong{color:var(--terra)}
</style>
</head>
<body>
<div class="app">
  <!-- Hero section -->
  <div class="hero">
    <div class="hero-name" id="heroName">กำลังโหลด...</div>
    <div class="hero-title">ผลสุขภาพ<br>ของคุณ</div>

    <div class="risk-badge">
      <div class="risk-dot" style="background:#F4B942"></div>
      <div>
        <div class="risk-badge-text" id="riskText">–</div>
        <div class="risk-badge-sub" id="riskSub">ปรับพฤติกรรม 12 สัปดาห์</div>
      </div>
    </div>

    <div class="score-wrap">
      <div class="ring-wrap">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="8"/>
          <circle cx="40" cy="40" r="34" fill="none" stroke="#E8A830" stroke-width="8"
            stroke-dasharray="213.6" stroke-dashoffset="53.4" stroke-linecap="round"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ringNum">–</div>
          <div class="ring-lbl">เป้าหมาย</div>
        </div>
      </div>
      <div class="score-info">
        <p>คะแนนสะสม</p>
        <strong id="scoreText">– <span>/ 450 คะแนน</span></strong>
        <p style="margin-top:6px;font-size:12px;color:rgba(255,255,255,.5)" id="scoreLevel">–</p>
      </div>
    </div>

    <div class="streak-wrap">
      <div class="streak-label">การส่งบันทึก 12 สัปดาห์</div>
      <div class="streak-dots" id="streakDots"></div>
    </div>
  </div>

  <!-- Content -->
  <div class="content pad">
    <div class="sect-title">ตัวเลขสุขภาพ ก่อน–หลัง</div>
    <div class="ba-card" id="baCard">
      <div style="padding:16px;text-align:center;color:#9B8B83;font-size:14px">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="sect-title" style="margin-top:4px">พฤติกรรมสัปดาห์ล่าสุด</div>
    <div class="beh-grid" id="behGrid">
      <div class="beh-item" style="grid-column:1/-1;text-align:center;color:#9B8B83;font-size:14px">กำลังโหลดข้อมูล...</div>
    </div>

    <div class="msg-card" id="msgCard" style="display:none">
      <p id="msgText"></p>
    </div>
  </div>
</div>

<script>
/*######################### Editable Start #########################*/
const LIFF_ID    = '2006915175-42T9BO4a';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz7zegkAeUyTwu7AYvvMflFjWLVpF8mAmsvomyCfSnPFaFyFUEh-PbWjf7GPmzEGie/exec';
/*#########################  Editable End  #########################*/

const RISK_CONFIG = {
  green  : { label:'กลุ่มเขียว — สุขภาพดี',    dot:'#4CAF50', sub:'รักษาพฤติกรรมดีต่อไป' },
  yellow : { label:'กลุ่มเสี่ยงเหลือง',          dot:'#F4B942', sub:'ปรับพฤติกรรม 12 สัปดาห์' },
  orange : { label:'กลุ่มเสี่ยงสูง — ส้ม',       dot:'#FF7043', sub:'ต้องการการดูแลเพิ่มเติม' },
  red    : { label:'กลุ่มเสี่ยงสูงมาก — แดง',   dot:'#E53935', sub:'อยู่ในการดูแลของเจ้าหน้าที่' },
  unknown: { label:'ยังไม่ได้คัดกรอง',            dot:'#9E9E9E', sub:'รอการวัดสุขภาพเบื้องต้น' },
};

const MAX_POINTS = 450;

function scoreLevel(pts) {
  if (pts >= 400) return 'ระดับ: แชมป์สุขภาพ 🏆';
  if (pts >= 300) return 'ระดับ: นักสู้สุขภาพ 💪';
  if (pts >= 150) return 'ระดับ: ผู้เริ่มต้น 🌱';
  return 'ระดับ: เพิ่งเริ่ม ✨';
}

function renderStreak(logs) {
  const container = document.getElementById('streakDots');
  container.innerHTML = '';
  const done = logs.length;
  for (let i = 1; i <= 12; i++) {
    const d = document.createElement('div');
    if (i < done) d.className = 'dot done';
    else if (i === done) d.className = 'dot current';
    else d.className = 'dot pending';
    d.textContent = i;
    container.appendChild(d);
  }
}

function renderScreening(s) {
  const card = document.getElementById('baCard');
  if (!s) {
    card.innerHTML = '<div style="padding:20px;text-align:center;color:#9B8B83;font-size:14px;line-height:1.7">ยังไม่มีข้อมูลตัวเลขสุขภาพ<br><span style="font-size:12px">จะแสดงผลหลังผ่านการคัดกรองสุขภาพ</span></div>';
    return;
  }
  const rows = [
    { label:'น้ำหนัก', before: s.weight ? s.weight + ' กก.' : '–', after:'–', unit:'' },
    { label:'BMI',     before: s.bmi    ? s.bmi              : '–', after:'–', unit:'' },
    { label:'รอบเอว',  before: s.waist  ? s.waist + ' ซม.'  : '–', after:'–', unit:'' },
    { label:'ความดัน', before: (s.bpSys && s.bpDia) ? `${s.bpSys}/${s.bpDia}` : '–', after:'–', unit:'' },
  ];
  card.innerHTML = rows.map(r => `
    <div class="ba-row">
      <span class="ba-name">${r.label}</span>
      <div class="ba-vals">
        <span class="ba-before">${r.before}</span>
        <span class="ba-arrow">→</span>
        <span class="ba-after" style="color:#9B8B83">${r.after}</span>
      </div>
    </div>`).join('');
}

function renderBehavior(logs) {
  const grid = document.getElementById('behGrid');
  const last = logs && logs.length > 0 ? logs[logs.length - 1] : null;
  if (!last) {
    grid.innerHTML = '<div class="beh-item" style="grid-column:1/-1;text-align:center;color:#9B8B83;font-size:14px;padding:8px">ยังไม่มีข้อมูลพฤติกรรม<br><span style="font-size:12px">จะแสดงผลหลังบันทึกรายสัปดาห์ครั้งแรก</span></div>';
    return;
  }
  const exPct   = Math.min((last.exMins / 150) * 100, 100);
  const sleepOk = last.sleepHrs >= 7 && last.sleepHrs <= 9;
  grid.innerHTML = `
    <div class="beh-item">
      <div class="beh-icon">🏃</div>
      <div class="beh-label">ออกกำลังกาย</div>
      <div class="beh-val">${last.exMins} <span class="beh-unit">นาที</span></div>
      <div class="beh-bar"><div class="beh-fill" style="width:${exPct}%;background:${exPct>=100?'var(--forest)':'var(--amber)'}"></div></div>
    </div>
    <div class="beh-item">
      <div class="beh-icon">🏋️</div>
      <div class="beh-label">วันออกกำลังกาย</div>
      <div class="beh-val">${last.exDays} <span class="beh-unit">วัน</span></div>
      <div class="beh-bar"><div class="beh-fill" style="width:${Math.min(last.exDays/5*100,100)}%;background:var(--forest)"></div></div>
    </div>
    <div class="beh-item">
      <div class="beh-icon">🌙</div>
      <div class="beh-label">การนอน</div>
      <div class="beh-val">${last.sleepHrs} <span class="beh-unit">ชม.</span></div>
      <div class="beh-bar"><div class="beh-fill" style="width:${sleepOk?100:60}%;background:${sleepOk?'var(--forest)':'var(--terra)'}"></div></div>
    </div>
    <div class="beh-item">
      <div class="beh-icon">😌</div>
      <div class="beh-label">ความเครียด</div>
      <div class="beh-val">${last.stress} <span class="beh-unit">/ 5</span></div>
      <div class="beh-bar"><div class="beh-fill" style="width:${(5-last.stress)/5*100}%;background:${last.stress<=2?'var(--forest)':'var(--terra)'}"></div></div>
    </div>`;

  // Message card
  const msg = document.getElementById('msgCard');
  const txt = document.getElementById('msgText');
  msg.style.display = 'block';
  txt.innerHTML = `สัปดาห์ที่ ${last.week} — ออกกำลังกาย ${last.exMins} นาที${last.exMins>=150?' ✓ ครบเป้า!':' (เป้า 150 นาที)'} นอน ${last.sleepHrs} ชม.${sleepOk?' ✓':''} เก็บได้ <strong>${last.points} คะแนน</strong> สัปดาห์นี้ ทำต่อไปนะครับ!`;
}

// ── Main ────────────────────────────────────────────────────────────────────
liff.init({ liffId: LIFF_ID })
  .then(() => {
    if (!liff.isLoggedIn()) { liff.login(); return; }
    return liff.getProfile();
  })
  .then(async profile => {
    const userId = profile ? profile.userId : 'dev_user';
    const res    = await fetch(`${SCRIPT_URL}?action=health&lineUserId=${userId}`);
    const data   = await res.json();

    if (!data.ok) {
      document.getElementById('heroName').textContent = 'ยังไม่ได้ลงทะเบียน';
      return;
    }

    // Hero
    document.getElementById('heroName').textContent = `${data.name || '–'} • ${data.community || '–'}`;

    // Risk
    const rc = RISK_CONFIG[data.riskGroup] || RISK_CONFIG.unknown;
    document.getElementById('riskText').textContent = rc.label;
    document.getElementById('riskSub').textContent  = rc.sub;
    document.querySelector('.risk-dot').style.background = rc.dot;

    // Score ring
    const pts  = data.totalPoints || 0;
    const pct  = Math.round((pts / MAX_POINTS) * 100);
    const circ = 213.6;
    const offset = circ - (circ * pct / 100);
    document.getElementById('ringNum').textContent = pct + '%';
    document.getElementById('scoreText').innerHTML = `${pts} <span>/ ${MAX_POINTS} คะแนน</span>`;
    document.getElementById('scoreLevel').textContent = scoreLevel(pts);
    document.querySelector('circle:last-child').setAttribute('stroke-dashoffset', offset);

    // Streak
    renderStreak(data.weeklyLogs || []);

    // Screening
    renderScreening(data.screening);

    // Behavior
    renderBehavior(data.weeklyLogs || []);
  })
  .catch(err => {
    console.error('error:', err);
    document.getElementById('heroName').textContent = 'ไม่สามารถโหลดข้อมูลได้';
    renderStreak([]);
    renderScreening(null);
    renderBehavior(null);
  });
</script>
</body>
</html>
