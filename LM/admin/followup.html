<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามกลุ่มเสี่ยง</title>
<link rel="stylesheet" href="admin.css">
<script src="sidebar.js"></script>
<style>

/* Filter tabs */
.filter-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tab-btn{
  padding:8px 18px;border-radius:100px;border:2px solid var(--border);
  background:var(--warm-white);font-family:'Sarabun',sans-serif;font-size:13px;
  font-weight:600;color:var(--stone);cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.tab-btn.active{border-color:currentColor}
.tab-btn.all.active{border-color:var(--bark);color:var(--bark);background:var(--cream)}
.tab-btn.red-tab.active{border-color:var(--rr);color:var(--rr);background:var(--rr-bg)}
.tab-btn.orange-tab.active{border-color:var(--ro);color:var(--ro);background:var(--ro-bg)}
.tab-btn.no-log.active{border-color:var(--ry);color:var(--ry);background:var(--ry-bg)}
.tab-count{font-size:11px;padding:2px 7px;border-radius:100px;background:currentColor;color:#fff;opacity:.8}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}

/* Follow-up card */
.fu-card{
  background:var(--warm-white);border-radius:18px;
  box-shadow:0 2px 8px rgba(42,31,26,.06);
  border-left:4px solid transparent;overflow:hidden;
  transition:transform .15s,box-shadow .15s;cursor:pointer;
}
.fu-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(42,31,26,.1)}
.fu-card-head{padding:18px 18px 14px;display:flex;gap:12px;align-items:flex-start}
.fu-av{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.fu-info{flex:1;min-width:0}
.fu-name{font-size:15px;font-weight:700;color:var(--bark)}
.fu-meta{font-size:12px;color:var(--stone);margin-top:2px}
.risk-pill-sm{padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700}
.fu-issues{padding:0 18px 14px;display:flex;flex-direction:column;gap:6px}
.issue-item{
  display:flex;align-items:flex-start;gap:8px;padding:10px 12px;
  border-radius:10px;font-size:13px;
}
.issue-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.fu-actions{padding:14px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.fu-actions-row{display:flex;gap:8px}
.action-btn{
  flex:1;padding:10px;border-radius:10px;border:none;
  font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;
}
.action-btn.primary{background:var(--terra);color:#fff}
.action-btn.primary:hover{background:var(--terra-dark)}
.action-btn.secondary{background:var(--cream);color:var(--stone);border:2px solid var(--border)}
.action-btn.secondary:hover{border-color:var(--terra);color:var(--terra)}
.action-btn.line-btn{background:#06C755;color:#fff}
.action-btn.line-btn:hover{background:#05a847}

/* LINE modal */
.tpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tpl-chip{
  padding:6px 14px;border-radius:100px;
  border:2px solid var(--border);background:var(--cream);
  font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;
  color:var(--stone);cursor:pointer;transition:all .15s;
}
.tpl-chip:hover{border-color:#06C755;color:#06C755}
.tpl-chip.active{border-color:#06C755;background:#E8F9EE;color:#056E2E}

/* Days overdue badge */
.days-badge{
  padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700;
}

/* Last contact strip */
.last-contact{
  padding:8px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--stone);background:var(--cream);
}
.last-contact svg{width:12px;height:12px;flex-shrink:0;opacity:.5}
.lc-action{font-weight:700;color:var(--bark)}
.no-contact{
  padding:8px 18px;border-top:1px solid var(--border);
  font-size:11px;color:var(--mist);background:var(--cream);font-style:italic;
}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(42,31,26,.5);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--warm-white);border-radius:24px;padding:28px;
  width:460px;max-width:90vw;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal{transform:none}
.modal h3{font-size:18px;font-weight:800;margin-bottom:6px}
.modal p{font-size:13px;color:var(--stone);margin-bottom:20px}
.modal textarea{
  width:100%;padding:14px;border-radius:14px;border:2px solid var(--border);
  background:var(--cream);font-family:'Sarabun',sans-serif;font-size:14px;
  outline:none;min-height:100px;resize:none;line-height:1.6;
}
.modal textarea:focus{border-color:var(--terra)}
.modal-btns{display:flex;gap:10px;margin-top:16px;justify-content:flex-end}
.modal-btn-cancel{padding:10px 20px;border-radius:100px;border:2px solid var(--border);background:transparent;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--stone);cursor:pointer}
.modal-btn-save{padding:10px 24px;border-radius:100px;border:none;background:var(--terra);color:#fff;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer}

.status-select{width:100%;padding:10px 14px;border-radius:12px;border:2px solid var(--border);background:var(--cream);font-family:'Sarabun',sans-serif;font-size:14px;outline:none;margin-bottom:14px;cursor:pointer}
.status-select:focus{border-color:var(--terra)}
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar"></div>

  <div class="main">
    <div class="topbar">
      <div><h1>ติดตามกลุ่มเสี่ยง</h1><p>12 ราย ต้องดำเนินการ</p></div>
    </div>
    <div class="body">
      <div class="filter-tabs">
        <button class="tab-btn all active" onclick="setTab('all',this)">ทั้งหมด <span class="tab-count" id="cntAll" style="background:var(--bark)">—</span></button>
        <button class="tab-btn red-tab" onclick="setTab('red',this)">🔴 กลุ่มแดง <span class="tab-count" id="cntRed" style="background:var(--rr)">—</span></button>
        <button class="tab-btn orange-tab" onclick="setTab('orange',this)">🟠 กลุ่มส้ม <span class="tab-count" id="cntOrange" style="background:var(--ro)">—</span></button>
        <button class="tab-btn no-log" onclick="setTab('nolog',this)">📭 ไม่ส่ง log <span class="tab-count" id="cntNolog" style="background:var(--ry)">—</span></button>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </div>
</div>

<!-- LINE Modal -->
<div class="modal-overlay" id="lineModal" onclick="closeLineModal(event)">
  <div class="modal">
    <h3>💬 ส่งข้อความผ่าน LINE</h3>
    <p id="lineModalSub" style="margin-bottom:14px">—</p>
    <div class="tpl-chips">
      <button class="tpl-chip" onclick="useTemplate('greet',this)">👋 ทักทายทั่วไป</button>
      <button class="tpl-chip" onclick="useTemplate('remind',this)">🔔 เตือนส่ง log</button>
      <button class="tpl-chip" onclick="useTemplate('appt',this)">📅 นัดพบเจ้าหน้าที่</button>
    </div>
    <textarea id="lineMsg" placeholder="หรือพิมพ์ข้อความเอง..." style="width:100%;padding:14px;border-radius:14px;border:2px solid var(--border);background:var(--cream);font-family:'Sarabun',sans-serif;font-size:14px;outline:none;resize:none;min-height:120px;line-height:1.7" onfocus="this.style.borderColor='#06C755'"></textarea>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="document.getElementById('lineModal').classList.remove('open')">ยกเลิก</button>
      <button class="modal-btn-save" id="lineSendBtn" style="background:#06C755" onclick="sendLineConfirm()">📤 ส่ง LINE</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalName">บันทึกการติดตาม</h3>
    <p id="modalSub">เลือกสถานะและระบุรายละเอียด</p>
    <select class="status-select" id="modalStatus">
      <option value="called">โทรติดต่อแล้ว — รับสาย</option>
      <option value="no_answer">โทรแล้ว — ไม่รับสาย</option>
      <option value="visited">เยี่ยมบ้านแล้ว</option>
      <option value="referred">ส่งต่อหน่วยบริการแล้ว</option>
      <option value="returning">กลับเข้าโปรแกรมแล้ว</option>
    </select>
    <textarea id="modalNote" placeholder="รายละเอียดเพิ่มเติม เช่น สาเหตุที่ขาด เหตุผลที่ยังไม่พร้อม..."></textarea>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="document.getElementById('modal').classList.remove('open')">ยกเลิก</button>
      <button class="modal-btn-save" id="saveBtn" onclick="saveLog()">💾 บันทึก</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyz7zegkAeUyTwu7AYvvMflFjWLVpF8mAmsvomyCfSnPFaFyFUEh-PbWjf7GPmzEGie/exec';

const riskStyle = {
  red:    {border:'var(--rr)',bg:'var(--rr-bg)',av:'#B03030',pill:'var(--rr-bg)',pillTxt:'var(--rr)',label:'แดง'},
  orange: {border:'var(--ro)',bg:'var(--ro-bg)',av:'#C86B3A',pill:'var(--ro-bg)',pillTxt:'var(--ro)',label:'ส้ม'},
  yellow: {border:'var(--ry)',bg:'var(--ry-bg)',av:'#C89B20',pill:'var(--ry-bg)',pillTxt:'var(--ry)',label:'เหลือง'},
};
const issueColors = {red:'var(--rr)',orange:'var(--ro)',yellow:'var(--ry)'};
const issueBg     = {red:'var(--rr-bg)',orange:'var(--ro-bg)',yellow:'var(--ry-bg)'};

let allData    = [];
let currentTab = 'all';

window.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
  document.getElementById('cardsGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--stone)">กำลังโหลดข้อมูล...</div>';
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getFollowups`);
    const data = await res.json();
    if (!data.ok) return;
    allData = data.items;
    document.getElementById('cntAll').textContent    = data.counts.total;
    document.getElementById('cntRed').textContent    = data.counts.red;
    document.getElementById('cntOrange').textContent = data.counts.orange;
    document.getElementById('cntNolog').textContent  = data.counts.nolog;
    document.querySelector('.topbar p').textContent  = `${data.counts.total} ราย ต้องดำเนินการ`;
    sidebarSetBadge(data.counts.total);
    renderCards();
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML = '<div style="text-align:center;padding:40px;color:var(--stone)">ไม่สามารถเชื่อมต่อได้</div>';
  }
}

function setTab(t, btn) {
  currentTab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  let filtered = allData;
  if (currentTab === 'red')    filtered = allData.filter(d => d.risk === 'red');
  if (currentTab === 'orange') filtered = allData.filter(d => d.risk === 'orange');
  if (currentTab === 'nolog')  filtered = allData.filter(d => d.days >= 14);
  if (!filtered.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--stone)">ไม่มีรายการในกลุ่มนี้ 👍</div>';
    return;
  }
  filtered.forEach(d => {
    const rs      = riskStyle[d.risk] || riskStyle.yellow;
    const daysBg  = d.days >= 14 ? 'var(--rr-bg)' : d.days >= 7 ? 'var(--ro-bg)' : 'var(--ry-bg)';
    const daysTxt = d.days >= 14 ? 'var(--rr)'    : d.days >= 7 ? 'var(--ro)'    : 'var(--ry)';
    const card = document.createElement('div');
    card.className = 'fu-card';
    card.style.borderLeftColor = rs.border;
    const safeName = (d.name || '').replace(/'/g, "\\'");
    const safeComm = (d.comm || '').replace(/'/g, "\\'");
    const safeUid  = (d.lineUserId || '').replace(/'/g, "\\'");
    card.innerHTML = `
      <div class="fu-card-head">
        <div class="fu-av" style="background:${rs.av}">${(d.name||'?')[0]}</div>
        <div class="fu-info">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
            <div class="fu-name">${d.name||'—'}</div>
            <span class="days-badge" style="background:${daysBg};color:${daysTxt}">${d.days > 0 ? d.days+' วัน' : 'วันนี้'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
            <span class="fu-meta">${d.comm||'—'}</span>
            <span class="risk-pill-sm" style="background:${rs.pill};color:${rs.pillTxt}">กลุ่ม${rs.label}</span>
          </div>
        </div>
      </div>
      <div class="fu-issues">
        ${(d.issues||[]).map(iss => `
          <div class="issue-item" style="background:${issueBg[iss.c]||'var(--ry-bg)'};color:${issueColors[iss.c]||'var(--ry)'}">
            <div class="issue-dot" style="background:${issueColors[iss.c]||'var(--ry)'}"></div>
            <span>${iss.t}</span>
          </div>`).join('')}
      </div>
      ${buildLastContact(d.lastContact)}
      <div class="fu-actions">
        <button class="action-btn primary" onclick="openModal('${safeUid}','${safeName}','${safeComm}')">📝 บันทึกการติดตาม</button>
        <div class="fu-actions-row">
          <button class="action-btn line-btn" onclick="openLineModal('${safeUid}','${safeName}','${safeComm}')">💬 ส่ง LINE</button>
          ${d.risk === 'red'
            ? `<button class="action-btn secondary">🏥 ส่งต่อ</button>`
            : `<button class="action-btn secondary">📞 โทรหา</button>`}
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── Last contact helper ───────────────────────────────────────────────────────
const ACTION_LABEL = {
  called    : 'โทรแล้ว — รับสาย',
  no_answer : 'โทรแล้ว — ไม่รับสาย',
  visited   : 'เยี่ยมบ้านแล้ว',
  referred  : 'ส่งต่อหน่วยบริการ',
  returning : 'กลับเข้าโปรแกรม',
};

function buildLastContact(lc) {
  if (!lc || !lc.ts) {
    return `<div class="no-contact">ยังไม่มีบันทึกการติดตาม</div>`;
  }
  const dt  = new Date(lc.ts).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
  const lbl = ACTION_LABEL[lc.action] || lc.action;
  return `
    <div class="last-contact">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      ล่าสุด <span class="lc-action">${lbl}</span> · ${dt}
      ${lc.note ? `<span style="color:var(--mist)">— ${lc.note}</span>` : ''}
    </div>`;
}

// ── LINE Push Message ─────────────────────────────────────────────────────────
const _startDate = new Date('2026-06-08T00:00:00+07:00');
const _curWeek   = Math.min(Math.max(Math.floor((Date.now() - _startDate) / (86400000 * 7)) + 1, 1), 12);

const LINE_TEMPLATES = {
  greet:  n => `สวัสดีครับ/ค่ะ ${n} 👋\n\nทีมงานโครงการ 90 วัน ขอทักทายและถามไถ่สุขภาพนะครับ/ค่ะ\nมีอะไรให้ช่วยเหลือหรืออยากปรึกษาไหมครับ/ค่ะ? 🌿`,
  remind: n => `🔔 แจ้งเตือน ${n}\n\nสัปดาห์ที่ ${_curWeek} ยังไม่ได้บันทึกสุขภาพประจำสัปดาห์นะครับ/ค่ะ\nกรุณาบันทึกผ่าน LINE ด้วยนะครับ/ค่ะ 🙏\n\nขอบคุณครับ/ค่ะ`,
  appt:   n => `สวัสดีครับ/ค่ะ ${n}\n\nเจ้าหน้าที่ขอนัดพบเพื่อตรวจสุขภาพและติดตามความคืบหน้า\n📅 วันที่: ________________\n⏰ เวลา: ________________\n📍 สถานที่: ________________\n\nกรุณาตอบรับนัดหมายด้วยนะครับ/ค่ะ 🙏`,
};

let _lineTarget = {};

function openLineModal(lineUserId, name, comm) {
  _lineTarget = { lineUserId, name, comm };
  document.getElementById('lineModalSub').textContent = name + ' · ' + comm;
  document.getElementById('lineMsg').value = '';
  document.getElementById('lineMsg').style.borderColor = 'var(--border)';
  document.querySelectorAll('.tpl-chip').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('lineSendBtn');
  btn.disabled = false; btn.textContent = '📤 ส่ง LINE'; btn.style.background = '#06C755';
  document.getElementById('lineModal').classList.add('open');
}

function useTemplate(key, el) {
  document.getElementById('lineMsg').value = LINE_TEMPLATES[key](_lineTarget.name);
  document.querySelectorAll('.tpl-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

function closeLineModal(e) {
  if (!e || e.target.id === 'lineModal') document.getElementById('lineModal').classList.remove('open');
}

async function sendLineConfirm() {
  const msg = document.getElementById('lineMsg').value.trim();
  if (!msg) { document.getElementById('lineMsg').focus(); return; }
  const btn = document.getElementById('lineSendBtn');
  btn.disabled = true; btn.textContent = 'กำลังส่ง...';
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=sendLineMessage&lineUserId=${encodeURIComponent(_lineTarget.lineUserId)}&message=${encodeURIComponent(msg)}`);
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✓ ส่งแล้ว'; btn.style.background = 'var(--forest)';
      setTimeout(() => document.getElementById('lineModal').classList.remove('open'), 1200);
    } else {
      alert('ส่งไม่สำเร็จ: ' + (data.error || 'unknown'));
      btn.disabled = false; btn.textContent = '📤 ส่ง LINE'; btn.style.background = '#06C755';
    }
  } catch {
    alert('ไม่สามารถเชื่อมต่อได้');
    btn.disabled = false; btn.textContent = '📤 ส่ง LINE'; btn.style.background = '#06C755';
  }
}

let _modalTarget = {};

function openModal(lineUserId, name, comm) {
  _modalTarget = { lineUserId, name, comm };
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalSub').textContent  = comm + ' · บันทึกวันที่ ' + new Date().toLocaleDateString('th-TH', {day:'numeric', month:'long'});
  document.getElementById('modalNote').value = '';
  const btn = document.getElementById('saveBtn');
  btn.disabled = false; btn.textContent = '💾 บันทึก'; btn.style.background = '';
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}
async function saveLog() {
  const action = document.getElementById('modalStatus').value;
  const note   = document.getElementById('modalNote').value.trim();
  const btn    = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก...';
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=saveFollowupLog&lineUserId=${encodeURIComponent(_modalTarget.lineUserId)}&logAction=${encodeURIComponent(action)}&note=${encodeURIComponent(note)}`);
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✓ บันทึกแล้ว'; btn.style.background = 'var(--forest)';
      setTimeout(() => {
        document.getElementById('modal').classList.remove('open');
        loadData();
      }, 900);
    } else {
      alert('บันทึกไม่สำเร็จ: ' + (data.error || 'unknown'));
      btn.disabled = false; btn.textContent = '💾 บันทึก'; btn.style.background = '';
    }
  } catch {
    alert('ไม่สามารถเชื่อมต่อได้');
    btn.disabled = false; btn.textContent = '💾 บันทึก'; btn.style.background = '';
  }
}
</script>
</body>
</html>
